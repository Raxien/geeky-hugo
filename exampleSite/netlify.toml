[build]
  publish = "public"
  command = "hugo --minify --gc"
  
[build.environment]
  HUGO_VERSION = "0.163.3"

[[headers]]
  for = "/*" # This defines which paths this specific [[headers]] block will cover.

[headers.values]
  X-Frame-Options = "DENY"
  X-XSS-Protection = "1; mode=block"
  Referrer-Policy = "same-origin"
  Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

[[headers]]
  for = "/sddefault_*.webp" # Miniature YouTube self-hosted in fase di build (vedi shortcode youtube2)

[headers.values]
  Cache-Control = "public, max-age=604800"

# Proxy per la miniatura del widget "Ultimi Vlog" (l'ultimo video pubblicato, non noto in fase di
# build): serve via Edge Function (netlify/edge-functions/yt-thumb.js) invece di un semplice
# redirect, perché un redirect status=200 lascia passare intatto il Cache-Control originale di
# YouTube (max-age=7200, 2h) senza che le [[headers]] qui sotto possano sovrascriverlo - quella
# regola si applica solo ai file serviti direttamente da Netlify, non alle risposte di un redirect
# proxy verso un'origine esterna. La Edge Function fa il fetch esplicitamente e può quindi
# impostare l'header lei stessa. Pubblicando un video ogni ~3 giorni, max-age=259200 (3 giorni) è
# un compromesso ragionevole tra freschezza e risparmio di richieste.
[[edge_functions]]
  path = "/yt-thumb/:size/:id"
  function = "yt-thumb"