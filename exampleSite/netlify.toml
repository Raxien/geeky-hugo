[build]
  publish = "public"
  command = "hugo --minify --gc"
  
[build.environment]
  HUGO_VERSION = "0.163.3"

[[headers]]
  for = "/*" # This defines which paths this specific [[headers]] block will cover.

[headers.values]
  X-Frame-Options = "DENY"
  X-XSS-Protection = "1; mode=block"
  Referrer-Policy = "same-origin"
  Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

[[headers]]
  for = "/sddefault_*.webp" # Miniature YouTube self-hosted in fase di build (vedi shortcode youtube2)

[headers.values]
  Cache-Control = "public, max-age=604800"

# Proxy per la miniatura del widget "Ultimi Vlog" (l'ultimo video pubblicato, non noto in fase di
# build): Netlify fa da reverse proxy verso img.youtube.com così possiamo impostare noi la durata
# della cache lato browser (loro la servono con soli 2h). Pubblicando un video ogni ~3 giorni,
# 3 giorni di cache è un compromesso ragionevole tra freschezza e risparmio di richieste.
[[redirects]]
  from = "/yt-thumb/:size/:id"
  to = "https://img.youtube.com/vi_webp/:id/:size.webp"
  status = 200
  force = true

[[headers]]
  for = "/yt-thumb/*"

[headers.values]
  Cache-Control = "public, max-age=259200"